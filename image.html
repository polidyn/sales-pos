<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Display - Angkor Royal Ice/title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #111;
    }

    header {
      background: #348ceb;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 15px;
    }

    .panel {
      background: white;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    img {
      max-width: 60%;
      height: auto;
      border-radius: 16px;
      border: 1px solid #ddd;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    .button {
      margin-top: 15px;
      padding: 14px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #4caf50;
      color: white;
      cursor: pointer;
    }

    .button:hover {
      background: #43a047;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="panel">
    <img src="apsara.PNG" alt="Shaved Ice Display" />
    <div>
      <button class="button" onclick="window.location.href='index.html'">Back to Sales</button>
    </div>
  </div>
</div>
</body>
</html>
